<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} P{{ page }} - Bili2Text</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <h1><a href="/">Bili2Text</a></h1>
            <a href="/documents" class="btn-outline">返回文档列表</a>
        </nav>

        <div class="doc-header">
            <h2>{{ title }}</h2>
            <p class="meta">{{ part }} (P{{ page }})</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('raw')">原始文本</button>
            <button class="tab-btn" onclick="switchTab('punctuated')">加标点</button>
            <button class="tab-btn" onclick="switchTab('summary')">总结</button>
        </div>

        <div id="content" class="content">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const bvid = '{{ bvid }}';
        const page = {{ page }};

        async function load(type) {
            const el = document.getElementById('content');
            el.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch(`/api/documents/${bvid}/${page}?doc_type=${type}`);
                const data = await res.json();
                if (type === 'raw') {
                    el.innerHTML = '<pre class="raw-text">' + escapeHtml(data.content || '暂无内容') + '</pre>';
                } else {
                    el.innerHTML = '<div class="markdown-body">' + marked.parse(data.content || '暂无内容') + '</div>';
                }
            } catch (e) {
                el.innerHTML = '<div class="error">加载失败: ' + e.message + '</div>';
            }
        }

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            load(type);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        load('raw');
    </script>
</body>
</html>
