<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站视频转录与智能总结</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 { text-align: center; color: #00a1d6; }
        .input-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #00a1d6;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background: #00a1d6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: #00a1d6;
            width: 0%;
            transition: width 0.4s ease;
        }
        .status {
            padding: 10px 14px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 14px;
        }
        .status.info { background: #e3f2fd; color: #1565c0; }
        .status.success { background: #e8f5e9; color: #2e7d32; }
        .status.error { background: #ffebee; color: #c62828; }
        .result-section {
            margin: 16px 0;
            padding: 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .result-section h3 {
            color: #00a1d6;
            margin-top: 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        .result-section pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #fafafa;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #00a1d6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>B站视频转录与智能总结</h1>

    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="请输入B站视频地址，如：https://www.bilibili.com/video/BV..." />
        <button onclick="submitVideo()" id="submitBtn">提交</button>
    </div>

    <div id="progressArea" class="hidden">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="status info" id="statusText"><span class="spinner"></span> 处理中...</div>
    </div>

    <div id="resultArea" class="hidden">
        <div class="result-section">
            <h3>原始转录文本</h3>
            <pre id="rawText"></pre>
        </div>
        <div class="result-section">
            <h3>加标点后文本</h3>
            <pre id="punctuatedText"></pre>
        </div>
        <div class="result-section">
            <h3>智能总结</h3>
            <div id="summaryText"></div>
        </div>
    </div>

    <script>
        const STATUS_PROGRESS = {
            'created': 5,
            'downloading': 20,
            'transcribing': 50,
            'punctuating': 70,
            'summarizing': 90,
            'completed': 100,
            'failed': 100
        };

        async function submitVideo() {
            const urlInput = document.getElementById('videoUrl');
            const url = urlInput.value.trim();
            if (!url) return alert('请输入视频地址');

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            try {
                const res = await fetch('/api/v1/tasks/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ video_url: url })
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.detail || '提交失败');
                    btn.disabled = false;
                    return;
                }

                document.getElementById('progressArea').classList.remove('hidden');
                document.getElementById('resultArea').classList.add('hidden');
                updateUI(data);

                // SSE 实时监听进度
                const evtSource = new EventSource(`/api/v1/tasks/${data.task_id}/stream`);
                evtSource.onmessage = (event) => {
                    const payload = JSON.parse(event.data);
                    updateUI(payload);
                    if (payload.status === 'completed' || payload.status === 'failed') {
                        evtSource.close();
                        btn.disabled = false;
                        // 拉取完整结果
                        fetchResult(data.task_id);
                    }
                };
                evtSource.onerror = () => {
                    evtSource.close();
                    btn.disabled = false;
                };
            } catch (e) {
                alert('网络错误');
                btn.disabled = false;
            }
        }

        function updateUI(status) {
            const pct = STATUS_PROGRESS[status.status] || 0;
            document.getElementById('progressFill').style.width = pct + '%';

            const statusText = document.getElementById('statusText');
            if (status.status === 'completed') {
                statusText.className = 'status success';
                statusText.innerHTML = '处理完成！';
            } else if (status.status === 'failed') {
                statusText.className = 'status error';
                statusText.innerHTML = (status.error_message || '处理失败');
            } else {
                statusText.className = 'status info';
                statusText.innerHTML = '<span class="spinner"></span> ' + status.status;
            }
        }

        async function fetchResult(taskId) {
            const res = await fetch(`/api/v1/tasks/${taskId}`);
            const data = await res.json();
            if (res.ok) {
                document.getElementById('rawText').textContent = data.raw_transcript || '';
                document.getElementById('punctuatedText').textContent = data.punctuated_text || '';
                document.getElementById('summaryText').innerHTML = (data.summary || '').replace(/\n/g, '<br>');
                document.getElementById('resultArea').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
